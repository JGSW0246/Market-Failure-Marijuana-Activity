<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DWL Sense Making Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --primary-dark: #1e40af;
            --secondary: #64748b;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --bg-body: #f1f5f9;
            --bg-card: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .dashboard-container {
            width: 100%;
            max-width: 1200px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* Header */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--border);
        }
        h1 { margin: 0; font-size: 1.5rem; font-weight: 700; color: var(--text-main); }
        
        .grid-layout {
            display: grid;
            grid-template-columns: 1fr 400px;
            gap: 20px;
        }

        /* Cards */
        .card {
            background: var(--bg-card);
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            padding: 20px;
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
        }

        .chart-wrapper { height: 450px; position: relative; width: 100%; margin-top: 10px;}

        /* Sidebar Stats */
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border);
        }
        
        .stat-box {
            text-align: center;
            padding: 10px;
            background: var(--bg-body);
            border-radius: 8px;
            border: 1px solid var(--border);
        }
        .stat-box.dwl-box {
            grid-column: span 2;
            background: #fef2f2;
            border-color: #fecaca;
            display: none; /* Hidden until revealed */
        }
        
        .big-number { font-size: 1.8rem; font-weight: 700; display: block; color: var(--text-main);}
        .big-number.success { color: var(--success); }
        .big-number.danger { color: var(--danger); }
        .sub-text { font-size: 0.8rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; }
        
        /* Table */
        table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        th { text-align: left; color: var(--text-muted); font-weight: 600; padding: 8px; border-bottom: 1px solid var(--border); }
        td { padding: 8px; border-bottom: 1px solid var(--border); font-variant-numeric: tabular-nums; }
        .val-pos { color: var(--success); font-weight: 600; }
        .val-neg { color: var(--danger); font-weight: 600; }
        .val-neu { color: var(--text-muted); }

        /* Controls */
        .controls { display: flex; gap: 10px; margin-bottom: 10px; }
        button {
            padding: 10px 18px;
            border-radius: 8px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.1s, background-color 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            font-size: 0.9rem;
        }
        button:active { transform: scale(0.98); }
        button:disabled {
            background-color: #cbd5e1 !important;
            color: #64748b !important;
            cursor: not-allowed;
            transform: none;
            border: none;
        }
        .btn-primary { background: var(--primary); color: white; flex: 1;}
        .btn-primary:hover { background: var(--primary-dark); }
        .btn-danger { background: var(--danger); color: white; flex: 1;}
        .btn-danger:hover { background: #b91c1c; }
        .btn-outline { background: white; border: 1px solid var(--border); color: var(--text-main); }
        .btn-outline:hover { background: #f8fafc; }

    </style>
</head>
<body>

<div class="dashboard-container">
    <header>
        <div>
            <h1>Deadweight Loss Sense Making Activity</h1>
            <span style="color: var(--text-muted); font-size: 0.9rem;">Market for Marijuana (Negative Externality)</span>
        </div>
        <button class="btn-outline" onclick="resetData()">↻ Reset Activity</button>
    </header>

    <div class="grid-layout">
        <div class="card">
            <div class="controls">
                <button class="btn-primary" id="btn-next" onclick="plotNextBuyer()">
                    Ask Buyer #<span id="next-buyer-id">1</span>
                </button>
                <button class="btn-danger" id="btn-reveal" onclick="revealSocialCost()">
                    Reveal Social Cost ($15)
                </button>
            </div>
            <div class="chart-wrapper">
                <canvas id="marketChart"></canvas>
            </div>
        </div>
        
        <div class="card">
            <div class="stats-grid">
                <div class="stat-box">
                    <span class="sub-text">Units Sold</span>
                    <span class="big-number" id="stat-units">0</span>
                </div>
                <div class="stat-box">
                    <span class="sub-text">Private Surplus</span>
                    <span class="big-number success" id="stat-surplus">$0</span>
                </div>
                <div class="stat-box dwl-box" id="dwl-container">
                    <span class="sub-text" style="color: #991b1b;">Total Deadweight Loss</span>
                    <span class="big-number danger" id="stat-dwl">$0</span>
                </div>
            </div>
            
            <div style="overflow-y: auto; max-height: 320px;">
                <table id="activity-table">
                    <thead>
                        <tr>
                            <th>Buyer</th>
                            <th>WTP</th>
                            <th>Decision</th>
                            <th>Pvt. Surplus</th>
                            <th class="col-dwl" style="display:none; color: var(--danger);">DWL</th>
                        </tr>
                    </thead>
                    <tbody>
                        </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
    // --- Data Definitions ---
    const PRICE = 10;
    const SOCIAL_COST = 15;
    
    const buyers = [
        { id: 1, wtp: 22 },
        { id: 2, wtp: 19 },
        { id: 3, wtp: 16 },
        { id: 4, wtp: 13 },
        { id: 5, wtp: 11 },
        { id: 6, wtp: 8 },
        { id: 7, wtp: 5 }
    ];

    const state = {
        currentIdx: 0,
        unitsSold: 0,
        privateSurplus: 0,
        totalDwl: 0,
        isRevealed: false
    };

    let marketChart;

    // --- Custom Chart Shading Plugin (For DWL) ---
    const dwlPlugin = {
        id: 'dwlShading',
        afterDatasetsDraw(chart) {
            if (!state.isRevealed) return;
            const {ctx, scales: {x, y}} = chart;
            const meta = chart.getDatasetMeta(0); // WTP bars dataset
            
            ctx.save();
            meta.data.forEach((bar, index) => {
                // Only draw DWL if the bar is currently plotted
                if (index < state.currentIdx) {
                    const wtp = buyers[index].wtp;
                    // DWL occurs if they bought it (WTP >= 10) AND it costs society more than they value it (WTP < 15)
                    if (wtp >= PRICE && wtp < SOCIAL_COST) {
                        const barX = bar.x;
                        const barWidth = bar.width;
                        const yMsc = y.getPixelForValue(SOCIAL_COST);
                        const yWtp = y.getPixelForValue(wtp);
                        
                        // Draw solid red box from WTP up to MSC
                        ctx.fillStyle = 'rgba(239, 68, 68, 0.9)'; // Tailwind red-500
                        ctx.fillRect(barX - barWidth/2, yMsc, barWidth, yWtp - yMsc);
                        
                        // Add -$ value text inside the box
                        ctx.fillStyle = 'white';
                        ctx.font = 'bold 12px Inter';
                        ctx.textAlign = 'center';
                        ctx.textBaseline = 'middle';
                        const dwlValue = SOCIAL_COST - wtp;
                        ctx.fillText('-$' + dwlValue, barX, yMsc + (yWtp - yMsc)/2);
                    }
                }
            });
            ctx.restore();
        }
    };
    Chart.register(dwlPlugin);

    // --- Initialization ---
    function initChart() {
        const ctx = document.getElementById('marketChart').getContext('2d');
        
        // Pre-fill labels but keep bar data null so they appear one by one
        const labels = buyers.map(b => `B${b.id}`);
        const emptyData = Array(buyers.length).fill(null);
        const mpcData = Array(buyers.length).fill(PRICE);
        const mscData = Array(buyers.length).fill(SOCIAL_COST);

        marketChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: labels,
                datasets: [
                    {
                        type: 'bar',
                        label: 'Willingness to Pay (WTP)',
                        data: emptyData,
                        backgroundColor: '#94a3b8', // Gray initially, turns green if bought
                        borderRadius: 4,
                        barPercentage: 0.6
                    },
                    {
                        type: 'line',
                        label: 'Market Price (MPC = $10)',
                        data: mpcData,
                        borderColor: '#2563eb', // Blue
                        borderWidth: 3,
                        borderDash: [5, 5],
                        pointRadius: 0,
                        fill: false
                    },
                    {
                        type: 'line',
                        label: 'Social Cost (MSC = $15)',
                        data: mscData,
                        borderColor: '#ef4444', // Red
                        borderWidth: 3,
                        pointRadius: 0,
                        fill: false,
                        hidden: true // Hidden until Revealed
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    y: {
                        min: 0, max: 25,
                        title: { display: true, text: 'Value ($)', font: {weight: 'bold'} },
                        grid: { color: '#e2e8f0' }
                    },
                    x: {
                        grid: { display: false }
                    }
                },
                plugins: {
                    legend: { position: 'top' },
                    tooltip: {
                        callbacks: {
                            label: function(context) {
                                return context.dataset.label + ': $' + context.raw;
                            }
                        }
                    }
                }
            }
        });
    }

    // --- Logic ---
    function plotNextBuyer() {
        if (state.currentIdx >= buyers.length) return;

        const buyer = buyers[state.currentIdx];
        const isBuying = buyer.wtp >= PRICE;
        
        // 1. Update Chart Data
        marketChart.data.datasets[0].data[state.currentIdx] = buyer.wtp;
        
        // Color the bar: Green if bought, Slate if passed
        const bgColors = marketChart.data.datasets[0].backgroundColor || [];
        if (!Array.isArray(bgColors)) {
            marketChart.data.datasets[0].backgroundColor = Array(buyers.length).fill('#94a3b8');
        }
        marketChart.data.datasets[0].backgroundColor[state.currentIdx] = isBuying ? '#10b981' : '#cbd5e1';
        
        marketChart.update();

        // 2. Calculate Math
        let pvtSurplus = 0;
        let dwl = 0;
        let decisionText = 'Pass';
        
        if (isBuying) {
            state.unitsSold++;
            pvtSurplus = buyer.wtp - PRICE;
            state.privateSurplus += pvtSurplus;
            decisionText = 'Buy';
            
            // Calculate potential DWL (even if not revealed yet)
            if (buyer.wtp < SOCIAL_COST) {
                dwl = SOCIAL_COST - buyer.wtp;
                state.totalDwl += dwl;
            }
        }

        // 3. Update DOM Stats
        document.getElementById('stat-units').innerText = state.unitsSold;
        document.getElementById('stat-surplus').innerText = '$' + state.privateSurplus;
        document.getElementById('stat-dwl').innerText = '$' + state.totalDwl;

        // 4. Update Table
        const tableBody = document.querySelector('#activity-table tbody');
        const row = tableBody.insertRow();
        const surplusClass = pvtSurplus > 0 ? 'val-pos' : 'val-neu';
        const dwlText = (isBuying && dwl > 0) ? `-$${dwl}` : '-';
        
        // Hide DWL column data if not revealed
        const dwlStyle = state.isRevealed ? '' : 'display:none;';
        
        row.innerHTML = `
            <td>Buyer ${buyer.id}</td>
            <td>$${buyer.wtp}</td>
            <td><strong>${decisionText}</strong></td>
            <td class="${surplusClass}">$${pvtSurplus}</td>
            <td class="col-dwl val-neg" style="${dwlStyle}">${dwlText}</td>
        `;

        // 5. Advance Index & Button State
        state.currentIdx++;
        const btnNext = document.getElementById('btn-next');
        if (state.currentIdx < buyers.length) {
            document.getElementById('next-buyer-id').innerText = buyers[state.currentIdx].id;
        } else {
            btnNext.disabled = true;
            btnNext.innerText = 'All Buyers Evaluated';
        }
    }

    function revealSocialCost() {
        state.isRevealed = true;
        
        // Unhide MSC line in chart
        marketChart.data.datasets[2].hidden = false;
        marketChart.update(); // Triggers the custom DWL shading plugin
        
        // Unhide DOM elements
        document.getElementById('dwl-container').style.display = 'block';
        document.querySelectorAll('.col-dwl').forEach(el => el.style.display = 'table-cell');
        
        // Disable reveal button
        const btnReveal = document.getElementById('btn-reveal');
        btnReveal.disabled = true;
        btnReveal.innerText = 'Social Cost Revealed';
    }

    function resetData() {
        state.currentIdx = 0;
        state.unitsSold = 0;
        state.privateSurplus = 0;
        state.totalDwl = 0;
        state.isRevealed = false;

        // Reset DOM Stats
        document.getElementById('stat-units').innerText = '0';
        document.getElementById('stat-surplus').innerText = '$0';
        document.getElementById('stat-dwl').innerText = '$0';
        document.getElementById('dwl-container').style.display = 'none';
        document.querySelector('#activity-table tbody').innerHTML = '';
        document.querySelectorAll('.col-dwl').forEach(el => el.style.display = 'none');

        // Reset Buttons
        const btnNext = document.getElementById('btn-next');
        btnNext.disabled = false;
        btnNext.innerHTML = `Ask Buyer #<span id="next-buyer-id">1</span>`;
        
        const btnReveal = document.getElementById('btn-reveal');
        btnReveal.disabled = false;
        btnReveal.innerText = 'Reveal Social Cost ($15)';

        // Re-init Chart completely
        if (marketChart) marketChart.destroy();
        initChart();
    }

    // Start
    initChart();

</script>
</body>
</html>
